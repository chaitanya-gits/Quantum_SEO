services:
  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    container_name: quantum-seo-backend
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ../../backend:/app/backend:ro
      - ../../frontend:/app/frontend:ro
      - ../../infra/certs:/app/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_started
      redis:
        condition: service_started

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    container_name: quantum-seo-worker
    restart: unless-stopped
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_started
      redis:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg17
    container_name: quantum-seo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: quantum_seo
      POSTGRES_USER: quantum
      POSTGRES_PASSWORD: quantum
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../infrastructure/sql/search-schema.sql:/docker-entrypoint-initdb.d/001-search-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantum -d quantum_seo"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: quantum-seo-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "QuantumSeoAdmin123!"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  redis:
    image: redis:7.4-alpine
    container_name: quantum-seo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  opensearch-data:
  redis-data:
